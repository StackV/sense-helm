### SENSE Keycloak Configuration
###

## @section Global Parameters
##
#
global:
  ## @param global.domain The host domain. Can be used for the Ingress hostname such as `keycloak.{{ .Values.global.domain }}`
  domain: example.es.net
  #
  security:
    ## @skip global.security.allowInsecureImages Bitnami image validator.
    allowInsecureImages: true

## @section Common Parameters
##
#
## @param namespaceOverride Override for the Helm namespace.
namespaceOverride:
## @param nameOverride Override for the Chart name.
nameOverride:

## @section PostgreSQL Subchart Parameters
##
#
postgresql:
  ## @param postgresql.enabled Whether to enable the included postgres deployment.
  enabled: true
  ## @param postgresql.auth.database The cluster init database name.
  auth:
    database: keycloak
    username: keycloak
    existingSecret: keycloak-psql-auth
    secretKeys:
      adminPasswordKey: admin-password
      userPasswordKey: password
  ## @param postgresql.primary.persistence.storageClass PVC storage class for the PSQL persistence.
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      existingClaim: ""
    ## @param postgresql.primary.startupProbe Startup probe configuration
    startupProbe:
      enabled: true
    ## @param postgresql.primary.livenessProbe Liveness probe configuration
    livenessProbe:
      enabled: true
    ## @param postgresql.primary.readinessProbe Readiness probe configuration
    readinessProbe:
      enabled: true
    ## @param postgresql.primary.resources Resource requests and limits
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 700m
        memory: 2Gi
    ## @param postgresql.primary.nodeSelector PSQL nodeSelector block.
    nodeSelector: { }
    ## @param postgresql.primary.tolerations PSQL tolerations block.
    tolerations: [ ]
    ## @param postgresql.primary.affinity PSQL affinity block.
    affinity: { }

## @section Keycloak Subchart Parameters
##
#
keycloakx:
  enabled: true
  image:
    repository: quay.io/virnao/sense-keycloak
    # Overrides the Keycloak image tag whose default is the chart appVersion
    tag: next
    ## @skip keycloakx.image.pullPolicy
    pullPolicy: Always
  ## @param keycloakx.imagePullSecrets Image pull secrets for the Keycloak deployment.
  imagePullSecrets: [ ]

  ## @skip keycloakx.proxy We set our own port env value.
  proxy:
    enabled: false

  dbchecker:
    enabled: true
  http:
    relativePath: "/"

  database:
    ## @skip keycloakx.database.postgres
    vendor: postgres
    ## @param keycloakx.database.postgres.hostname Database address.
    hostname: keycloak-postgresql
    ## @param keycloakx.database.postgres.port Database port.
    port: 5432
    ## @param keycloakx.database.postgres.database Database name.
    database: keycloak
    ## @param keycloakx.database.postgres.user Database user.
    user: keycloak
    ## @param keycloakx.database.postgres.password Database password.
    existingSecret: keycloak-psql-auth
    existingSecretKey: password

  existingAuthSecret: keycloak-auth
  command:
    - "/opt/keycloak/bin/kc.sh"
    - "--verbose"
    - "start"
    - "--hostname-strict=false"
  ## @param keycloakx.extraEnv
  extraEnv: |
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: tempadmin
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: {{ .Values.existingAuthSecret }}
          key: admin-password
    - name: KC_PROXY_HEADERS
      value: xforwarded
    - name: KC_HTTP_MANAGEMENT_SCHEME
      value: http
    - name: JAVA_OPTS_APPEND
      value: "-Xms1024m -Xmx4096m"

  ## @param keycloakx.args
  args:
    - "--import-realm"
    - "--features=preview,admin-fine-grained-authz:v1,scripts:v1"

  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "2000m"
      memory: "4024Mi"


## @section Custom Ingress Parameters
##
#
ingress:
  ## @param ingress.enabled Whether to enable the custom Ingress resource.
  enabled: false
  ## @param ingress.className The Ingress class.
  className: traefik
  ## @param ingress.annotations A dict of additional annotations, such as cert-manager Issuers.
  annotations: { }
  ## @param ingress.hostname The hostname for the main and unfiltered admin endpoint. Can be templated.
  adminHostname: keycloak-admin.{{ .Values.global.domain }}
  ## @param ingress.authHostname The hostname for the limited auth endpoint, used by the Orchestrator. Can be templated.
  authHostname: auth.{{ .Values.global.domain }}
  ## @param ingress.tlsSecret Secret for the TLS credentials. Can be templated.
  tlsSecret: "{{ .Release.Name }}-tls-keycloak"
#
issuer:
  ## @param issuer.enabled Whether to enable the integrated cert-manager Issuer.
  enabled: false
  ## @param issuer.name Overrride for the Issuer name.
  name:
  ## @param issuer.email Email metadata for the Issuer.
  email: example@gmail.com
  ## @param issuer.server Issuing server.
  server: https://acme-v02.api.letsencrypt.org/directory
  ## @param issuer.solvers Override for the Issuer solvers.
  solvers: [ ]
